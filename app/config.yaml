name: "Clocteck RGB Tube Clock"
description: "MQTT bridge for the Clocteck RGB Tube Clock — per-tube colour, color modes (Custom/Rainbow/Breathing/Flowing), display style, alarm, timer, DST, timezone dropdown, and continuous 1-second time sync."
version: "1.2.2"
slug: "nixie_clock_mqtt"
changelog: "CHANGELOG.md"
init: false
startup: services
boot: auto
services:
  - mqtt:need
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
homeassistant_api: false
auth_api: false
ingress: false
hassio_api: false
apparmor: true
host_network: false
map:
  - config:rw

options:
  nixie_host: "192.168.5.108"
  poll_interval: 1
  mqtt_url: ""
  mqtt_user: ""
  mqtt_pass: ""
  log_level: "info"

schema:
  nixie_host: str
  poll_interval: int(1,60)
  # 1 second is recommended — the bridge uses change detection so state is only
  # re-published when something actually changed. Faster polling means the
  # continuous time sync loop stays accurate.
  mqtt_url: str?
  mqtt_user: str?
  mqtt_pass: str?
  log_level: list(debug|info|warn|error)
